<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TOPIK 6급 Daily Study</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--card:#1a1a2e;--card-border:#2a2a4a;
  --accent:#6c5ce7;--accent-light:#a29bfe;
  --pink:#fd79a8;--red:#ff6b6b;--green:#00b894;--cyan:#00ced1;--yellow:#fdcb6e;
  --text:#e0e0e0;--dim:#888;--faint:#555;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif;
  background:var(--bg);color:var(--text);
  max-width:430px;margin:0 auto;min-height:100vh;
  padding:0 0 80px;-webkit-font-smoothing:antialiased;
}

/* === HEADER === */
.header{
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  padding:20px 20px 16px;border-bottom:1px solid var(--card-border);
  position:sticky;top:0;z-index:10;
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.greeting{font-size:1.1rem;font-weight:700;color:#fff}
.date-badge{font-size:.7rem;color:var(--dim);background:rgba(108,92,231,.15);padding:4px 10px;border-radius:20px;border:1px solid rgba(108,92,231,.2)}
.countdown-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.countdown-bar .days{font-size:1.8rem;font-weight:800;color:var(--red);line-height:1}
.countdown-bar .days-label{font-size:.7rem;color:var(--dim)}
.countdown-progress{flex:1;height:6px;background:#2a2a4a;border-radius:3px;overflow:hidden}
.countdown-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));border-radius:3px;transition:width .5s}
.patterns-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.pattern-pill{flex-shrink:0;background:rgba(108,92,231,.15);border:1px solid rgba(108,92,231,.3);color:var(--accent-light);font-size:.75rem;font-weight:600;padding:5px 12px;border-radius:20px;white-space:nowrap;cursor:pointer}
.pattern-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* === STREAK === */
.streak-bar{display:flex;justify-content:center;gap:4px;padding:12px 20px 0}
.streak-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700}
.streak-dot.done{background:var(--green);color:#fff}
.streak-dot.today{background:var(--accent);color:#fff;box-shadow:0 0 10px rgba(108,92,231,.5)}
.streak-dot.future{background:#1a1a2e;border:1px solid var(--card-border);color:var(--faint)}
.streak-dot.rest{background:#1a1a2e;border:1px dashed var(--faint);color:var(--faint)}
.streak-label{text-align:center;font-size:.65rem;color:var(--faint);margin-top:4px;padding-bottom:8px}

/* === SECTIONS === */
.section{padding:20px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim)}
.section-progress{font-size:.75rem;color:var(--faint)}
.section-progress span{color:var(--green);font-weight:700}
.divider{height:8px;background:rgba(0,0,0,.3)}

/* === TASK CARD === */
.task{
  background:var(--card);border:1px solid var(--card-border);border-radius:14px;
  padding:16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;
  transition:all .2s;cursor:pointer;position:relative;overflow:hidden;
}
.task:active{transform:scale(.98)}
.task.completed{opacity:.5;border-color:var(--green)}
.task.completed .task-check{background:var(--green);border-color:var(--green)}
.task.completed .task-check::after{content:'\2713';color:#fff;font-size:.7rem;font-weight:800}
.task-check{width:24px;height:24px;border:2px solid var(--card-border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px}
.task-content{flex:1;min-width:0}
.task-title{font-size:.9rem;font-weight:600;color:#fff;margin-bottom:3px}
.task-desc{font-size:.78rem;color:var(--dim);line-height:1.4}
.task-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.task-tag{font-size:.6rem;padding:2px 8px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.tag-time{background:rgba(253,203,110,.15);color:var(--yellow)}
.tag-output{background:rgba(108,92,231,.15);color:var(--accent-light)}
.tag-fluency{background:rgba(253,121,168,.15);color:var(--pink)}
.tag-topik{background:rgba(255,107,107,.15);color:var(--red)}
.tag-input{background:rgba(0,206,209,.15);color:var(--cyan)}
.tag-builtin{background:rgba(0,184,148,.15);color:var(--green)}
.tag-external{background:rgba(255,255,255,.08);color:var(--dim)}
.task-arrow{color:var(--faint);font-size:1.2rem;flex-shrink:0;align-self:center}

/* === EXPANDABLE CONTENT === */
.task-expand{display:none;margin-top:10px}
.task.expanded .task-expand{display:block}
.pattern-card{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.15);border-radius:10px;padding:12px;margin-bottom:8px}
.pattern-card .ko{font-size:.95rem;font-weight:600;color:#fff;margin-bottom:4px}
.pattern-card .ja{font-size:.8rem;color:var(--accent-light);margin-bottom:6px}
.pattern-card .example{font-size:.8rem;color:var(--dim);line-height:1.4}
.pattern-card .example-ja{font-size:.75rem;color:var(--faint);margin-top:2px}
.play-btn{display:inline-flex;align-items:center;gap:4px;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:.7rem;font-weight:600;cursor:pointer;margin-top:8px}
.play-btn:active{opacity:.7}
.copy-box{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.15);border-radius:8px;padding:10px;font-size:.78rem;color:var(--accent-light);margin-top:8px;cursor:pointer;position:relative}
.copy-box:active::after{content:'Copied!';position:absolute;top:50%;right:10px;transform:translateY(-50%);background:var(--green);color:#fff;padding:2px 8px;border-radius:4px;font-size:.65rem}
.prompt-box{background:rgba(253,121,168,.08);border:1px solid rgba(253,121,168,.15);border-radius:8px;padding:10px;margin-top:8px}
.prompt-box .label{font-size:.8rem;color:var(--pink);font-weight:600}
.prompt-box .text{font-size:.85rem;color:#fff;margin-top:4px}
.writing-slots{display:flex;gap:6px;margin-top:8px}
.writing-slot{flex:1;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2);border-radius:8px;padding:8px;text-align:center;font-size:.7rem;color:var(--dim)}
.writing-slot.today-slot{border-color:var(--red);color:var(--red);font-weight:600}
.writing-slot .slot-label{font-size:.6rem;color:var(--faint);margin-bottom:2px}

/* === 4/3/2 TIMER === */
.timer-container{margin-top:10px;text-align:center}
.timer-display{font-size:2.5rem;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;margin:10px 0}
.timer-label{font-size:.75rem;color:var(--pink);font-weight:600;margin-bottom:4px}
.timer-btns{display:flex;gap:8px;justify-content:center}
.timer-btn{padding:8px 20px;border:none;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer}
.timer-btn.start{background:var(--accent);color:#fff}
.timer-btn.stop{background:var(--red);color:#fff}
.timer-btn.next{background:var(--pink);color:#fff}
.timer-btn:disabled{opacity:.3;cursor:not-allowed}

/* === MOTIVATION === */
.motivation-card{margin:0 20px;background:linear-gradient(135deg,#1b2e1b,#1a1a2e);border:1px solid rgba(0,184,148,.2);border-radius:14px;padding:16px;text-align:center}
.motivation-card .quote{font-size:.9rem;color:#fff;font-weight:600;margin-bottom:6px}
.motivation-card .sub{font-size:.75rem;color:var(--dim)}

/* === BOTTOM NAV === */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:linear-gradient(to top,var(--bg),rgba(15,15,26,.95));border-top:1px solid var(--card-border);display:flex;padding:10px 0 24px;z-index:10}
.nav-item{flex:1;text-align:center;color:var(--faint);font-size:.65rem;cursor:pointer;transition:color .2s}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:1.3rem;margin-bottom:2px;display:block}

/* === TOAST === */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 20px;border-radius:8px;font-size:.8rem;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* === PAGE VIEWS === */
.page{display:none}
.page.active{display:block}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ========== TODAY PAGE ========== -->
<div class="page active" id="page-today">

<div class="header">
  <div class="header-top">
    <div class="greeting" id="greeting"></div>
    <div class="date-badge" id="date-badge"></div>
  </div>
  <div class="countdown-bar">
    <div>
      <div class="days" id="days-left"></div>
      <div class="days-label">日</div>
    </div>
    <div style="flex:1">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:.65rem;color:var(--faint)">4/16 START</span>
        <span style="font-size:.65rem;color:var(--red)">6/13 TOPIK</span>

      <div class="countdown-progress"><div class="countdown-fill" id="countdown-fill"></div></div>

  <div class="patterns-strip" id="patterns-strip"></div>
</div>

<div class="streak-bar" id="streak-bar"></div>

<!-- BASE TASKS -->
<div class="section">
  <div class="section-header">
    <div class="section-title">&#x1F4CC; 基本タスク</div>
    <div class="section-progress"><span id="base-done">0</span> / <span id="base-total">7</span> 完了</div>
  </div>
  <div id="base-tasks"></div>
</div>

<div class="divider"></div>

<!-- EXTRA TASKS -->
<div class="section">
  <div class="section-header">
    <div class="section-title">&#x2B50; 追加タスク</div>
    <div class="section-progress">余裕があれば</div>

</div>

<div class="divider"></div>

<div class="section">

    <div class="quote">文法は「知っている」。あとは「使える」ようにするだけ。</div>
    <div class="sub" id="motivation-sub"></div>

</div>

</div><!-- /page-today -->

<!-- ========== PATTERN PAGE ========== -->
<div class="page" id="page-patterns">
  <div style="padding:20px">
    <h2 style="color:#fff;font-size:1.1rem;margin-bottom:4px">今日のパターン</h2>
    <p style="color:var(--dim);font-size:.8rem;margin-bottom:16px">タップして聴く・例文を確認</p>
    <div id="pattern-detail-cards"></div>
  </div>
</div>

<!-- ========== PROGRESS PAGE ========== -->
<div class="page" id="page-progress">
  <div style="padding:20px">
    <h2 style="color:#fff;font-size:1.1rem;margin-bottom:16px">進捗</h2>
    <div id="progress-stats" style="display:flex;gap:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:120px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px;text-align:center">
        <div style="font-size:2rem;font-weight:800;color:var(--green)" id="stat-streak">0</div>
        <div style="font-size:.7rem;color:var(--dim)">連続日数</div>
      </div>
      <div style="flex:1;min-width:120px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px;text-align:center">
        <div style="font-size:2rem;font-weight:800;color:var(--accent)" id="stat-total">0</div>
        <div style="font-size:.7rem;color:var(--dim)">学習日数</div>
      </div>
      <div style="flex:1;min-width:120px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px;text-align:center">
        <div style="font-size:2rem;font-weight:800;color:var(--yellow)" id="stat-rate">0%</div>
        <div style="font-size:.7rem;color:var(--dim)">平均達成率</div>
      </div>
    </div>
    <div style="margin-top:20px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px">
      <div style="font-size:.8rem;font-weight:600;color:#fff;margin-bottom:10px">最近7日間</div>
      <div id="recent-log" style="font-size:.8rem;color:var(--dim)">データがまだありません</div>
    </div>
  </div>
</div>

<!-- ========== BOTTOM NAV ========== -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showPage('today')"><span class="nav-icon">&#x1F3E0;</span>今日</div>
  <div class="nav-item" onclick="showPage('patterns')"><span class="nav-icon">&#x1F4DA;</span>パターン</div>
  <div class="nav-item" onclick="showPage('progress')"><span class="nav-icon">&#x1F4CA;</span>進捗</div>
</div>

// === HELPERS ===
function getDayNumber() {
  const diff = today - START_DATE;
  return Math.max(1, Math.ceil(diff / (1000*60*60*24)));
}

function getDaysLeft() {
  const diff = EXAM_DATE - today;
  return Math.max(0, Math.ceil(diff / (1000*60*60*24)));
}

function getRotationDay() {
  return ((getDayNumber() - 1) % 27);
}

function getTodayPatterns() {
  const idx = getRotationDay();
  return ROTATION[idx] ? ROTATION[idx].patterns : ROTATION[0].patterns;
}

function getWeekNumber() {
  return Math.ceil(getDayNumber() / 7);
}

function get432Tier() {
  const w = getWeekNumber();
  if (w <= 2) return 'A';
  if (w <= 4) return 'B';
  if (w <= 6) return 'C';
  return 'D';
}

function get432Prompt() {
  const tier = get432Tier();
  const prompts = PROMPTS_432[tier];
  const idx = (getDayNumber() - 1) % prompts.length;
  return { tier, prompt: prompts[idx] };
}

function getWritingDay() {
  const dow = today.getDay(); // 0=Sun
  if (dow === 0 || dow === 6) return -1; // weekend
  return dow - 1; // 0=Mon..4=Fri
}

function getGreeting() {
  const h = today.getHours();
  if (h < 12) return 'おはよう';
  if (h < 18) return 'こんにちは';
  return 'おつかれさま';
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

const GCLOUD_TTS_KEY = 'AIzaSyBLnu9xtZvpZlmgX8dS6SS94HZAUQEm4ZQ';
const TTS_CACHE = {};

async function speak(text) {
  // Check cache first
  if (TTS_CACHE[text]) {
    const audio = new Audio(TTS_CACHE[text]);
    audio.play();
    return;
  }

  try {
    const res = await fetch(
      `https://texttospeech.googleapis.com/v1/text:synthesize?key=${GCLOUD_TTS_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          input: { text },
          voice: { languageCode: 'ko-KR', name: 'ko-KR-Neural2-A', ssmlGender: 'FEMALE' },
          audioConfig: { audioEncoding: 'MP3', speakingRate: 0.9, pitch: 0 }
        })
      }
    );
    const data = await res.json();
    if (data.audioContent) {
      const audioUrl = 'data:audio/mp3;base64,' + data.audioContent;
      TTS_CACHE[text] = audioUrl;
      const audio = new Audio(audioUrl);
      audio.play();
    } else {
      // Fallback to browser TTS
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR';
      u.rate = 0.85;
      speechSynthesis.speak(u);
    }
  } catch (e) {
    // Fallback to browser TTS on error
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR';
    u.rate = 0.85;
    speechSynthesis.speak(u);
  }
}

  if (state.synced) return;
  const patterns = getTodayPatterns();
  const baseDone = Object.values(state.baseTasks).filter(Boolean).length;
  const extraDone = Object.values(state.extraTasks).filter(Boolean).length;
  const baseKeys = ['patterns','quizlet','ai-chat','drill','432','journal','writing'];
  const extraKeys = ['shadowing','reading','article','review'];
  const completed = baseKeys.filter(k => state.baseTasks[k]).concat(extraKeys.filter(k => state.extraTasks[k]));
  const skipped = baseKeys.filter(k => !state.baseTasks[k]).concat(extraKeys.filter(k => !state.extraTasks[k]));

  syncToSheet({
    type: 'daily_log',
    date: todayStr,
    dayNumber: getDayNumber(),
    daysLeft: getDaysLeft(),
    patterns: patterns.map(p => p.ko),
    baseDone, baseTotal: 7,
    extraDone, extraTotal: 4,
    completedTasks: completed,
    skippedTasks: skipped
  });

  saveState();
}

function renderStreak() {
  const bar = document.getElementById('streak-bar');
  const dow = today.getDay();
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + mondayOffset + i);
    const dayIdx = (i + 1) % 7; // 0=Sun
    const isToday = d.toISOString().slice(0,10) === todayStr;
    const isPast = d < today && !isToday;
    const isSunday = dayIdx === 0;

    let cls = 'future';
    if (isSunday) cls = 'rest';
    else if (isToday) cls = 'today';
    else if (isPast) {
      const saved = localStorage.getItem('streak-' + d.toISOString().slice(0,10));
      cls = saved ? 'done' : 'future';
    }
    html += `<div class="streak-dot ${cls}">${DAY_NAMES_JA[dayIdx]}</div>`;
  }
  bar.innerHTML = html;
}

      <div class="timer-display" id="timer-display">4:00</div>
      <div class="timer-btns">
        <button class="timer-btn start" id="timer-start" onclick="event.stopPropagation();startTimer()">開始</button>
        <button class="timer-btn next" id="timer-next" onclick="event.stopPropagation();nextPhase()" disabled>次へ</button>
      </div>
    </div>`;

  // Writing expand
  let writingExpand = '<div class="writing-slots">';
  WRITING_SCHEDULE.forEach((s, i) => {
    const isCurrent = i === wDay;
    writingExpand += `<div class="writing-slot ${isCurrent?'today-slot':''}"><div class="slot-label">${DAY_NAMES_JA[i+1]}</div>${s}</div>`;
  });
  writingExpand += '</div>';
  if (wDay >= 0) {
    writingExpand += `<div style="margin-top:8px;font-size:.78rem;color:var(--dim)">※듣기·읽기は学校でカバー済み</div>`;
  }

  const baseHTML = [
    createTaskHTML('patterns','今日のパターン確認','3つのパターンを声に出して例文を言う','15分','learning',
      '<span class="task-tag tag-builtin">ページ内</span>', patternExpand, true),
    createTaskHTML('quizlet','逆引きQuizlet','日→韓 方向のみ。必ず声に出して答える！','15分','output',
      '<span class="task-tag tag-output">産出</span><span class="task-tag tag-external">Quizlet &#x2197;</span>', null, true),
    createTaskHTML('ai-chat','AIチャット会話','今日の3パターンを使って会話。最後15分はボイスモード','45分','output',
      '<span class="task-tag tag-output">産出</span><span class="task-tag tag-external">ChatGPT / Claude &#x2197;</span>', aiExpand, true),
    createTaskHTML('drill','産出ドリル','10〜15問、各10秒以内に声に出して答える','20分','fluency',
      '<span class="task-tag tag-fluency">流暢さ</span><span class="task-tag tag-builtin">ページ内</span>', null, true),
    createTaskHTML('432','4/3/2 スピーキング','1つのテーマを4分→3分→2分で話す。録音して比較','15分','fluency',
      '<span class="task-tag tag-fluency">流暢さ</span><span class="task-tag tag-builtin">タイマー内蔵</span>', timerExpand, true),
    createTaskHTML('journal','韓国語日記','半ページ、今日の3パターンを必ず使う。AIに添削依頼','30分','output',
      '<span class="task-tag tag-output">産出</span><span class="task-tag tag-external">ノート + AI &#x2197;</span>', null, true),
    createTaskHTML('writing','TOPIK 쓰기 練習','自習は쓰기に集中（듣기·읽기は学校でカバー）','60分','topik',
      '<span class="task-tag tag-topik">TOPIK</span><span class="task-tag tag-builtin">ページ内</span>', writingExpand, true),
  ].join('');

  const extraHTML = [
    createTaskHTML('shadowing','シャドーイング','ドラマ3分間。再生→繰り返し→録音→比較','30分','fluency',
      '<span class="task-tag tag-fluency">流暢さ</span>', null, false),
    createTaskHTML('reading','多読（速読パス）','既読テキストを辞書なしで速く読む','30分','fluency',
      '<span class="task-tag tag-fluency">流暢さ</span>', null, false),
    createTaskHTML('article','記事リーディング + 単語','ニュース/EBS記事1本 + 新しい単語10個をメモ','55分','input',
      '<span class="task-tag tag-input">入力</span>', null, false),
    createTaskHTML('review','寝る前復習','逆引きQuizlet 15分 → 4/3/2の2分ver再生 → 韓国語で3文書く','30分','output',
      '<span class="task-tag tag-output">産出</span>', null, false),
  ].join('');

  document.getElementById('base-tasks').innerHTML = baseHTML;
  document.getElementById('extra-tasks').innerHTML = extraHTML;
  updateProgress();
}

function renderPatternPage() {
  const patterns = getTodayPatterns();
  document.getElementById('pattern-detail-cards').innerHTML = patterns.map(p => `
    <div style="background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:20px;margin-bottom:12px">
      <div style="font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:6px">${p.ko}</div>
      <div style="font-size:.9rem;color:var(--accent-light);margin-bottom:12px">${p.ja}</div>
      <div style="font-size:.9rem;color:var(--text);margin-bottom:4px">${p.ex_ko}</div>
      <div style="font-size:.8rem;color:var(--dim);margin-bottom:12px">${p.ex_ja}</div>
      <button class="play-btn" onclick="speak('${p.ex_ko.replace(/'/g,"\\'")}')">&#x1F50A; 聴く</button>
      <button class="play-btn" style="background:var(--pink)" onclick="speak('${p.ex_ko.replace(/'/g,"\\'")}');setTimeout(()=>speak('${p.ex_ko.replace(/'/g,"\\'")}'),4000)">&#x1F501; 2回聴く</button>
    </div>`).join('');
}

// === INTERACTIONS ===
function toggleTask(id, isBase, e) {
  e.stopPropagation();
  const stateObj = isBase ? state.baseTasks : state.extraTasks;
  stateObj[id] = !stateObj[id];
  saveState();

  const el = document.getElementById('task-' + id);
  el.classList.toggle('completed', stateObj[id]);
  updateProgress();

  const taskTitle = el.querySelector('.task-title').textContent;
  const category = el.querySelector('.task-tag:nth-child(2)')?.textContent || '';
  logTaskCheck(id, taskTitle, category, stateObj[id]);

  if (stateObj[id]) {
    toast('完了！');
    // Mark today in streak
    localStorage.setItem('streak-' + todayStr, '1');
    renderStreak();
  }

  // Auto-sync when all base tasks done
  const baseDone = Object.values(state.baseTasks).filter(Boolean).length;
  if (baseDone >= 7) {
    syncDailySummary();
    toast('全基本タスク完了！データを保存しました');
  }
}

function toggleExpand(id) {
  const el = document.getElementById('task-' + id);
  el.classList.toggle('expanded');
}

function updateProgress() {
  const baseDone = Object.values(state.baseTasks).filter(Boolean).length;
  document.getElementById('base-done').textContent = baseDone;
}

// === 4/3/2 TIMER ===
let timerInterval = null;
let timerPhase = 0; // 0=4min, 1=3min, 2=2min
let timerSeconds = 240;
const TIMER_PHASES = [{label:'4分',secs:240},{label:'3分',secs:180},{label:'2分',secs:120}];

function startTimer() {
  document.getElementById('timer-start').disabled = true;
  document.getElementById('timer-next').disabled = true;
  timerSeconds = TIMER_PHASES[timerPhase].secs;
  timerInterval = setInterval(() => {
    timerSeconds--;
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timer-display').textContent = '0:00';
      document.getElementById('timer-next').disabled = timerPhase >= 2;
      if (timerPhase >= 2) {
        toast('4/3/2 完了！お疲れさま！');
        document.getElementById('timer-start').disabled = false;
      }
      return;
    }
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    document.getElementById('timer-display').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function nextPhase() {
  timerPhase++;
  if (timerPhase > 2) timerPhase = 2;
  document.getElementById('timer-phase').textContent = TIMER_PHASES[timerPhase].label;
  document.getElementById('timer-display').textContent =
    `${Math.floor(TIMER_PHASES[timerPhase].secs/60)}:00`;
  document.getElementById('timer-start').disabled = false;
  document.getElementById('timer-next').disabled = true;
}

// === NAV ===
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.currentTarget?.classList.add('active');

  if (name === 'progress') loadProgress();
}

function loadProgress() {
  // From localStorage streak data
  let streak = 0;
  let totalDays = 0;
  const d = new Date(START_DATE);
  while (d <= today) {
    const key = 'streak-' + d.toISOString().slice(0,10);
    if (localStorage.getItem(key)) {
      totalDays++;
      if (d.toISOString().slice(0,10) === todayStr || streak > 0) streak++;
    } else if (streak > 0 && d < today) {
      streak = 0;
    }
    d.setDate(d.getDate() + 1);
  }
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('stat-total').textContent = totalDays;

  const baseDone = Object.values(state.baseTasks).filter(Boolean).length;
  document.getElementById('stat-rate').textContent = Math.round((baseDone / 7) * 100) + '%';
}

// === INIT ===
renderHeader();
renderStreak();
renderTasks();
renderPatternPage();

// Sync daily summary at midnight or when page loads with all tasks done
if (Object.values(state.baseTasks).filter(Boolean).length >= 7 && !state.synced) {
  syncDailySummary();
}
</script>
